<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <style>
    .ml  { fill: #1A1D20; }
    .dot { fill: #DF2935; }
    @media (prefers-color-scheme: dark) {
      .ml { fill: #F4F4F6; }
    }
    text {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-weight: 700;
      font-size: 62px;
      letter-spacing: -3px;
    }
  </style>
  <text x="50" y="50" text-anchor="middle" dominant-baseline="central"><tspan class="ml">ML</tspan><tspan class="dot">.</tspan></text>
</svg>
